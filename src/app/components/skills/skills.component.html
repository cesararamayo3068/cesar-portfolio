<section class="section" id="skills">
  <p class="eyebrow">Stack técnico</p>
  <h2>Herramientas con las que construyo</h2>

  <div class="skills-groups">
    <div class="skill-group" *ngFor="let group of skillGroups">
      <h3>{{ group.category }}</h3>

      <div class="skills-grid">
        <div class="skill-card" *ngFor="let skill of group.skills">
          <img *ngIf="skill.icon" [src]="skill.icon" [alt]="skill.name">
          <span class="skill-initial" *ngIf="!skill.icon">{{ skill.name.charAt(0) }}</span>
          <span>{{ skill.name }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
